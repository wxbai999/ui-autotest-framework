[pytest]
# ============================================================
# Pytest 配置文件
# ============================================================

# 测试文件发现规则
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# 测试根目录
testpaths = tests

# 默认命令行参数（可在 CLI 覆盖）
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=allure-results
    --reruns=2
    --reruns-delay=3

# 注册自定义 markers
markers =
    smoke: 冒烟测试 — 核心功能，快速通过
    regression: 回归测试 — 全量用例
    slow: 慢速用例
    p0: 优先级 P0 — 阻断级
    p1: 优先级 P1 — 严重级
    p2: 优先级 P2 — 一般级

# 日志
log_cli = true
log_cli_level = INFO
log_cli_format = [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
